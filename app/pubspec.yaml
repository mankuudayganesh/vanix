name: vanix
description: VANIX — Premium OTT Streaming Platform

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.7.0
  connectivity_plus: ^6.0.5

  # Video Player
  video_player: ^2.9.1
  chewie: ^1.8.5

  # UI & Design
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.0+3
  carousel_slider: ^5.0.0
  flutter_staggered_grid_view: ^0.7.0
  lottie: ^3.1.2

  # Navigation
  go_router: ^14.3.0

  # Storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Authentication
  google_sign_in: ^6.2.1
  pin_code_fields: ^8.0.1

  # Firebase
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # Payments
  razorpay_flutter: ^1.3.7

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.0
  share_plus: ^10.0.3
  permission_handler: ^11.3.1
  path_provider: ^2.1.4
  uuid: ^4.5.1
  logger: ^2.4.0

  # Icons
  cupertino_icons: ^1.0.8
  iconsax: ^0.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.0
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  fonts:
    - family: Orbitron
      fonts:
        - asset: assets/fonts/Orbitron-Regular.ttf
        - asset: assets/fonts/Orbitron-Bold.ttf
          weight: 700
        - asset: assets/fonts/Orbitron-ExtraBold.ttf
          weight: 800

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
