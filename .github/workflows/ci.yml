name: VANIX CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ------------------------------------------------------------
  # Job 1: Node.js Backend API Service Test & Build
  # ------------------------------------------------------------
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Build
        run: npm run build

      - name: Run Tests
        run: npm run test

  # ------------------------------------------------------------
  # Job 2: Next.js Admin Dashboard CI Build
  # ------------------------------------------------------------
  admin-ci:
    name: Admin Dashboard CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./admin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './admin/package-lock.json'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Build
        run: npm run build

  # ------------------------------------------------------------
  # Job 3: Flutter Client Mobile Application CI
  # ------------------------------------------------------------
  flutter-ci:
    name: Flutter Mobile CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java Development Kit (JDK)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation (build_runner)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Verify static analysis
        run: flutter analyze

      - name: Run Unit Tests
        run: flutter test --no-pub

  # ------------------------------------------------------------
  # Job 4: Build & Push Docker Images (Backend & Admin)
  # ------------------------------------------------------------
  docker-release:
    name: Build & Push Docker Containers
    needs: [backend-ci, admin-ci]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}

      - name: Build and Push Admin Image
        uses: docker/build-push-action@v5
        with:
          context: ./admin
          file: ./admin/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/admin:latest
            ghcr.io/${{ github.repository }}/admin:${{ github.sha }}
