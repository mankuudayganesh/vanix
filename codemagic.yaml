# Codemagic CI/CD Configuration for VANIX Monorepo

workflows:
  ios-release:
    name: iOS Release (.ipa)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      # For automated iOS signing, define your App Store Connect API keys in the Codemagic UI (Environment variables)
      # or specify the group name containing them below:
      # groups:
      #   - app-store-credentials
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
    scripts:
      - name: Install dependencies
        script: |
          cd app
          flutter pub get
      - name: Build iOS IPA
        script: |
          cd app
          # Compiles iOS release build and exports the .ipa package
          flutter build ipa --release --no-codesign
          
          # Manually package the unsigned Runner.app into an unsigned .ipa
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r app.ipa Payload
    artifacts:
      - app/build/ios/ipa/*.ipa

